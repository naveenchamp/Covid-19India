services:
  - type: web
    name: covid19india-backend
    runtime: node
    rootDir: backend/Covid-19India
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: covid19india-frontend
    runtime: static
    rootDir: frontend/frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
